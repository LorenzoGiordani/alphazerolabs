id: xsmom-v1
parent: null
status: candidate          # FALSIFICATA come tradabile: l'IC esiste (+0.028, t+4.2) ma il backtest basket fa -14.5%, 3/9. L'edge e troppo sottile per trade discreti stop-based (fee/slippage lo mangiano). Per raccoglierlo serve un engine a PORTAFOGLIO (pesi continui dollar-neutral), non l'engine per-simbolo. Vedi notes.
created: '2026-06-22'
thesis: >
  Cross-sectional momentum: dentro il basket crypto, gli asset più forti nelle
  ultime ~168h continuano a sovraperformare i più deboli (vs tsmom che confronta
  l'asset con sé stesso). Long sul top-terzile per forza relativa, short sul
  bottom-terzile → market-neutral, netta il beta comune del basket (corr media
  0.63) e isola il segnale relativo. Edge misurato empiricamente prima di
  costruirlo: IC +0.028 (t +4.2), spread top-bottom +1.63%/settimana
  (research_edges.py, 2026-06-22).
  Falsificata se: il long-top/short-bottom non batte buy&hold risk-adjusted sul
  basket 6 mesi walk-forward, o se il segnale relativo non sopravvive ai costi
  (fee/slippage) e al gate DSR.

universe:
  selection: explicit
  exclude: []
  max_assets: 9
  kinds: [perp]
paper_symbols: BTC,ETH,SOL,XRP,SUI,NEAR,WLD,ZEC,CRV

timeframe: 1h
decision_every_h: 4

signals:
  - name: xsection_momentum
    params: {hi_pct: 66, lo_pct: 33}

entry:
  rule: xsection_momentum
  direction: follow:xsection_momentum   # +1 top basket → long, -1 bottom → short

exit:
  stop_pct: 4.0
  stop_atr_mult: 3.0
  target_r: 2.0
  atr_period: 14
  time_stop_h: 240

risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 8

evolution:
  mutable: [signals, entry, exit, universe.max_assets, decision_every_h]
  notes: >
    v1 — cross-sectional momentum (segnale xsection_momentum, cache data/xsection).
    IC validato in ricerca (+0.028, t+4.2) MA non tradabile per-simbolo: basket 6m
    -14.5%, meanSharpe -1.45, 3/9. L'edge relativo va catturato con ribilanciamento
    continuo dollar-neutral (engine a portafoglio), non con trade stop-based. Tenuta
    come record + base per l'engine a portafoglio futuro. Mutazioni: soglie hi/lo,
    lookback, RR — ma il limite e l'engine, non i parametri.

backtest: {}
