# Generazione 1 — candidati proposti da Claude (sessione 12/06, piano Pro)
# Parent: funding-squeeze-breakout-v1 (ret -4.74%, sharpe -1.04, 1/6 fold, chop -8.65%)
id: tmp-g1
thesis: >
  Il parent perde nel chop perché tratta ogni rottura di range come breakout.
  Una rottura che parte da volatilità compressa ha follow-through; una in
  volatilità normale è rumore. Falsificata se: breakout filtrato per
  compressione non batte il breakout semplice su 6 mesi walk-forward.
universe: {selection: top_liquidity, max_assets: 10, kinds: [perp]}
timeframe: 1h
decision_every_h: 4
signals:
  - name: vol_compression
    params: {lookback_h: 48, pct: 20}
  - name: range_breakout
    params: {range_h: 48, volume_confirm_mult: 2.0}
entry: {rule: vol_compression AND range_breakout, direction: with_breakout}
exit: {stop_pct: 2.5, target_r: 2.5, time_stop_h: 72}
evolution:
  mutable: [signals, entry, exit, universe.max_assets, decision_every_h]
  notes: "Sostituito filtro funding con vol_compression: attacca direttamente la perdita nel chop. Funding filtrava il crowding ma non la qualità del breakout."
---
id: tmp-g2
thesis: >
  Funding a estremo + taker flow che spinge nello stesso verso del crowding =
  esaurimento: chi doveva comprare ha comprato. Il fade dell'affollamento paga
  nel chop (dove il parent perde) perché i prezzi tornano in range. Falsificata
  se: il fade perde anche nel regime chop o subisce squeeze ripetuti nei trend.
universe: {selection: top_liquidity, max_assets: 10, kinds: [perp]}
timeframe: 1h
decision_every_h: 4
signals:
  - name: funding_percentile
    params: {lookback_h: 168, extreme_pct: 92}
  - name: taker_flow
    params: {lookback_h: 24, threshold: 0.02}
entry: {rule: funding_percentile AND taker_flow, direction: contrarian_funding}
exit: {stop_pct: 2.0, target_r: 1.5, time_stop_h: 24}
evolution:
  mutable: [signals, entry, exit, universe.max_assets, decision_every_h]
  notes: "Inversione completa: da trend-following a mean-reversion sul crowding. Stop stretto e time_stop corto: la tesi di esaurimento o si realizza subito o è sbagliata."
