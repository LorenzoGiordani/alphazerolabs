  stop_pct: 0
  target_r: 0
  time_stop_h: 0
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 9
evolution:
  mutable:
  - portfolio
  notes: 'v1 seed: liqimb 7d reb24. Mutazioni: lookback (3/7/14g), rebalance, combo
    con xsmom. Dipendenza operativa: data/coinalyze_1h/ dal cron cloud (6h) — se il
  collector si ferma il run fallisce chiuso (con <3 simboli nessun rebalance e
  nessun deploy), invece di degradare silenziosamente.

    '
