id: tsmom-neutral-v1
parent: null
status: champion
engine: portfolio
created: '2026-07-04'
thesis: 'TIME-SERIES momentum sign-based a portafoglio: long ogni asset con ritorno
  trailing 168h > 0, short se < 0, equal-weight per gamba, ribilancio 24h. A differenza
  di xsmom (rank RELATIVO, dollar-neutral by-construction) il book puo'' diventare
  net-long/net-short quando i segni concordano: e'' la sleeve DIREZIONALE trend che
  il dollar-neutral puro lascia sul tavolo. P&L backtest onesto: funding cashflow
  modellato (-W*r/8, book non neutrale = funding non si azzera). NOTA STORICA (backtest_tsmom_hmm.py,
  04/07): la candidata Fase 2 era "tsmom regime-gated HMM" — il gate HMM e'' stato
  FALSIFICATO (ogni variante gated peggiora: lb168 gated-BTC Sharpe 0.33 vs ungated
  2.02; replica la lezione 25/06 sulle commodity "il veto hmm peggiora in tutti i
  subset"). Il tsmom LISCIO invece promuove: Sharpe 2.02, DSR 0.71 (n_trials=12),
  maxDD -26%, corr +0.40 vs xsmom. lb168 e'' stabile anche a reb 168h (1.90); lb336
  e'' param-sensitive (1.06@24h vs 2.32@168h) -> scelto lb168/reb24. Falsificata se:
  in paper forward il book non batte l''equal-weight B&H risk-adjusted, o il drawdown
  supera -30% (coda piu'' larga di xsmom, e'' il prezzo dell''esposizione direzionale).

  '
universe:
  selection: all_perps
paper_symbols: BTC,ETH,SOL,XRP,SUI,NEAR,WLD,ZEC,CRV
portfolio:
  lookback_h: 168
  rebalance_h: 24
  gross: 1.0
  dollar_neutral: false
  factor: tsmom
timeframe: 1h
decision_every_h: 4
signals: []
exit:
  stop_pct: 0
  target_r: 0
  time_stop_h: 0
risk:
  max_leverage: 2
  risk_per_trade_pct: 1.0
  max_concurrent_positions: 9
evolution:
  mutable:
  - portfolio
  notes: 'v1 seed: tsmom sign lb168 reb24. Mutazioni: lookback (96 debole 0.90, 336
    instabile), rebalance, vol-target overlay (candidato naturale: DD -26% e'' la
    coda da tagliare). NON rimettere il gate HMM (falsificato 2 volte: 25/06 commodity,
    04/07 crypto).

    '
backtest:
  basket_12m:
    config: tsmom sign lb168 reb24 gross1.0, funding cashflow modellato
    aggregate:
      total_return: 1.6866
      sharpe: 2.02
      max_drawdown: -0.2621
      dsr: 0.71
      rebalances: 219
    diagnostics:
      corr_vs_xsmom: 0.4
      hmm_gate: FALSIFICATO
      combo3_blend: NON promossa
    note: '3a candidata Fase 2 (02/07). Il gate HMM (tesi originale) e'' falsificato;
      il tsmom liscio a cadenza 24h supera la soglia zoo (Sharpe>1 & DSR>=0.5). Sleeve
      direzionale: da valutare in paper forward se il beta condizionale aggiunge valore
      al book aggregato o duplica xsmom nei trend forti.

      '
