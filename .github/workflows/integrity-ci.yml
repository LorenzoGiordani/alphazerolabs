name: integrity-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: integrity-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - name: integrity tests
        run: >-
          uv run --frozen --with pytest==9.0.2 pytest -q
          tests/test_evidence.py
          tests/test_runtime_health.py
          tests/test_dashboard_integrity.py
          tests/test_propr_evidence_gate.py
          tests/test_lifecycle_rules.py
          tests/test_live_cache.py
          tests/test_runtime_coverage.py
          tests/test_decide_universe.py
          tests/test_cloud_llm_disabled.py
          tests/test_research_pack.py
          tests/test_research_cloud.py
          tests/test_coinalyze_freshness.py
          tests/test_research_ops.py
      - name: cron Worker routing tests
        run: node --test infra/cron-trigger/src/index.test.js
      - name: fatal Python checks
        run: uv run --frozen --with ruff==0.15.8 ruff check --select E9,F63,F7,F82 .
