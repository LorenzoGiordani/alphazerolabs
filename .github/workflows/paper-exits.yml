name: paper-exits

# Exit-check real-time TP/SL. Lanciato via workflow_dispatch dal Worker CF
# (lux-paper-cron) SOLO quando un livello stop/target è sfiorato → minuti ~zero.
# Stesso concurrency group dell'hourly: niente sovrapposizioni / race sullo stato.
#
# DECISIONE (audit 2026-07-02, MEDIUM "coda unica"): il gruppo condiviso RESTA.
# - state.json è read-modify-write full-file: gruppi separati = due writer
#   concorrenti = lost update / PnL doppio (peggio della latenza).
# - la latenza NON distorce i fill: paper_exits riempie al prezzo del livello
#   sulla candela storica (watermark checked_until), non al prezzo corrente.
# - un pending cancellato da un dispatch successivo si auto-ripara: il monitor
#   del Worker (ogni 3 min) re-dispatcha finché il breach persiste nello state.
#   Attesa worst-case ≈ durata paper-run (~8 min) + un tick monitor.
on:
  workflow_dispatch:

concurrency:
  group: paper-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      LLM_RUNTIME_DISABLED: "1"
      RUNTIME_COVERAGE_DISABLED: "1"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: exit-check TP/SL
        id: exits
        run: uv run scripts/paper_exits.py

      - name: valida runtime health (fail-closed, max 2h)
        id: health
        if: always()
        run: uv run scripts/runtime_health.py validate paper/health.json --max-age-seconds 7200

      - name: dashboard
        id: dashboard
        if: steps.exits.outcome == 'success' && steps.health.outcome == 'success'
        run: uv run scripts/dashboard.py

      - name: deploy dashboard pubblica (lux-ai.pages.dev)
        if: env.CLOUDFLARE_API_TOKEN != '' && steps.exits.outcome == 'success' && steps.health.outcome == 'success' && steps.dashboard.outcome == 'success'
        run: |
          mkdir -p /tmp/lux-deploy && cp dashboard/*.html dashboard/data.js dashboard/health.json dashboard/SKILL.md /tmp/lux-deploy/ && cp -R dashboard/assets /tmp/lux-deploy/assets
          rm -f /tmp/lux-deploy/template.html   # sorgente, non si pubblica
          npx -y wrangler@4.107.0 pages deploy /tmp/lux-deploy --project-name lux-ai --branch main --commit-dirty=true

      - name: publish
        if: always()
        run: |
          git config user.name "lux-ai-cron"
          git config user.email "actions@users.noreply.github.com"
          git add paper/
          if [ "${{ steps.dashboard.outcome }}" = "success" ]; then
            git add dashboard/*.html dashboard/data.js dashboard/health.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: exit-check $(date -u '+%Y-%m-%d %H:%M') UTC [actions]"
            pushed=false
            for i in 1 2 3; do
              if git pull --rebase -X theirs origin main && git push origin main; then
                pushed=true
                break
              fi
              sleep 5
            done
            [ "$pushed" = true ] || exit 1
          fi
