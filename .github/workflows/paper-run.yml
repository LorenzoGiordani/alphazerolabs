name: paper-run

# Run 24/7 in cloud: ogni ora anche a Mac spento. Paper trading; l'LLM è GLM-5.2
# via OpenRouter (secret OPENROUTER_API_KEY), max effort reasoning.
# Trigger orario via Cloudflare Worker (lux-paper-cron) → workflow_dispatch: lo
# scheduler nativo GitHub saltava le run su repo privato. Worker = clock affidabile.
on:
  workflow_dispatch:

concurrency:
  group: paper-run
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: dati COT CFTC (settimanali)
        run: uv run scripts/fetch_cot.py || true

      # liquidazioni reali per il segnale liq_imbalance (challenger tsmom-liq). Gira solo col secret.
      - name: liquidazioni Coinalyze
        if: env.COINALYZE_API_KEY != ''
        run: uv run scripts/fetch_coinalyze.py --symbols BTC,ETH,SOL,XRP,SUI,NEAR,WLD,ZEC,CRV --months 7 || true

      # trada dinamicamente tutte le strategie attive (champion + challenger)
      - name: paper trading strategie attive
        run: uv run scripts/paper_all.py

      - name: executor agenti
        run: |
          uv run scripts/agents_paper.py
          uv run scripts/agents_paper.py --account agents-rr2-v1 --source agents-v1 --target-r 2.0 || true   # A/B RR2: stesse decisioni, zero LLM extra

      # xsmom-port RIPRESA 26/06: edge +79.8% a 12m, strumentazione paper fixata.
      # Gira tutte le engine:portfolio attive (champion + challenger) via active_specs:
      # niente più glob pattern — ogni futura portfolio viene inclusa automaticamente.
      - name: portfolio paper trading
        run: uv run scripts/portfolio_all.py

      # gira solo se il secret OPENROUTER_API_KEY esiste (OpenRouter → GLM-5.2)
      - name: pipeline LLM (review + decide)
        if: env.OPENROUTER_API_KEY != ''
        run: |
          uv run scripts/review.py || true
          uv run scripts/decide.py BTC,ETH,SOL,SUI,ZEC || true
          uv run scripts/agents_paper.py || true
          uv run scripts/agents_paper.py --account agents-rr2-v1 --source agents-v1 --target-r 2.0 || true   # variante RR2
          # Claude Strategy RETIRATA 25/06 (layer LLM non aggiungeva valore): rimosso.
          # glm-regime-confluence RETIRATA 26/06: zombie (0 trade in 3 giorni, gate sempre chiuso,
          # non backtestabile desk LLM). Auditor/regime-filter LLM non produce alpha: rimosso.
          uv run scripts/geopolitics_paper.py || true   # desk macro cross-asset, gated su burst GDELT

      # EVOLUZIONE SUL CAMPO — promozione/retrocessione AD OGNI RUN (cheap, LLM-free,
      # gate conservativi: no-op finché non ci sono abbastanza trade chiusi).
      - name: promote/retire continuo
        run: uv run scripts/promote.py || true

      # chiude le posizioni delle strategie appena ritirate + exit-check TP/SL
      - name: exit-check (chiude retired + TP/SL)
        run: uv run scripts/paper_exits.py || true

      # GENERAZIONE nuovi challenger — settimanale (lun 00:xx UTC), serve l'LLM ed è pesante.
      - name: evolve (genera challenger)
        if: env.OPENROUTER_API_KEY != ''
        run: |
          if [ "$(date -u +%u)" = "1" ] && [ "$(date -u +%H)" = "00" ]; then
            uv run scripts/evolve_auto.py || true
          else
            echo "evolve: salta (gira lun 00:xx UTC)"
          fi

      - name: sync journal → Supabase (idempotente, gated su credenziali)
        if: env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        # continue-on-error invece di `|| true`: il run prosegue ma lo step
        # diventa rosso in Actions se righe non sincronizzano (prima: exit 0 muto)
        continue-on-error: true
        run: uv run scripts/sync_supabase.py

      - name: backtest report (basket multi-asset, honest engine)
        run: uv run scripts/backtest_report.py

      - name: dashboard
        id: dashboard
        if: always()
        # frontend più recente PRIMA di rigenerare (checkout mirato: il working
        # tree ha i dati del run non ancora committati, un pull fallirebbe):
        # un fix UI pushato a run in corso veniva sovrascritto dal deploy di
        # questo job e restava offline fino al run successivo
        run: |
          git fetch origin main || true
          git checkout origin/main -- dashboard/template.html scripts/dashboard.py || true
          uv run scripts/dashboard.py

      - name: deploy dashboard pubblica (lux-ai.pages.dev)
        if: always() && env.CLOUDFLARE_API_TOKEN != '' && steps.dashboard.outcome == 'success'
        run: |
          mkdir -p /tmp/lux-deploy && cp dashboard/*.html dashboard/data.js /tmp/lux-deploy/ && cp -R dashboard/assets /tmp/lux-deploy/assets
          rm -f /tmp/lux-deploy/template.html   # sorgente, non si pubblica
          npx -y wrangler@4.107.0 pages deploy /tmp/lux-deploy --project-name lux-ai --branch main --commit-dirty=true

      - name: publish
        run: |
          git config user.name "lux-ai-cron"
          git config user.email "actions@users.noreply.github.com"
          # SOLO i file news di cui questo run è owner: gdelt_events/timeline e
          # x_live appartengono ai workflow precompute (concurrency group diversi);
          # committare tutta data/news/ + rebase -X theirs scartava i loro dati freschi
          git add paper/ dashboard/*.html dashboard/data.js strategies/ \
                  data/news/gdelt_live.parquet data/news/live_archive.jsonl
          if ! git diff --cached --quiet; then
            git commit -m "chore: paper run $(date -u '+%Y-%m-%d %H:%M') UTC [actions]"
            for i in 1 2 3; do
              git pull --rebase -X theirs origin main && git push origin main && break
              sleep 5
            done
          fi
