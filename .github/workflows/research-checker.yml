name: research-checker

on:
  workflow_dispatch:

concurrency:
  group: research-checker
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  checker:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: seleziona il pack Maker piu vecchio non verificato
        id: preflight
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          inventory=/tmp/actions-artifacts.json
          mkdir -p /tmp/research-maker /tmp/research-checker /tmp/research-scan
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" > "$inventory"
          mapfile -t candidates < <(
            python scripts/artifact_queue.py candidates \
              --artifacts "$inventory" \
              --source-prefix research-maker-
          )

          selected=""
          for artifact_id in "${candidates[@]}"; do
            artifact=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}")
            producer_run_id=$(jq -r '.workflow_run.id // empty' <<< "$artifact")
            producer=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${producer_run_id}")
            if [ "$(jq -r '.path' <<< "$producer")" != ".github/workflows/research-maker.yml" ] \
              || [ "$(jq -r '.head_branch' <<< "$producer")" != "main" ] \
              || [ "$(jq -r '.conclusion' <<< "$producer")" != "success" ]; then
              echo "::warning::ignoro artifact ${artifact_id}: producer Maker non autorevole"
              continue
            fi

            scan_dir="/tmp/research-scan/${artifact_id}"
            mkdir -p "$scan_dir/files"
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              > "$scan_dir/artifact.zip"
            if ! unzip -q "$scan_dir/artifact.zip" -d "$scan_dir/files"; then
              echo "::warning::ignoro artifact ${artifact_id}: zip invalido"
              continue
            fi
            if [ ! -f "$scan_dir/files/pack.json" ] || [ ! -f "$scan_dir/files/maker.json" ]; then
              echo "::warning::ignoro artifact ${artifact_id}: pack.json o maker.json mancante"
              continue
            fi
            producer_sha=$(jq -r '.head_sha // empty' <<< "$producer")
            if [ "$(jq -r '.repo_commit // empty' "$scan_dir/files/pack.json")" != "$producer_sha" ]; then
              echo "::warning::ignoro artifact ${artifact_id}: repo_commit non coincide col Maker"
              continue
            fi
            if ! uv run --frozen python -m scripts.research_pack validate-maker \
              --pack "$scan_dir/files/pack.json" \
              --maker "$scan_dir/files/maker.json" > "$scan_dir/validation.json"; then
              echo "::warning::ignoro artifact ${artifact_id}: contratto Maker invalido o scaduto"
              continue
            fi
            pack_id=$(jq -r '.pack_id // empty' "$scan_dir/files/pack.json")
            if [[ ! "$pack_id" =~ ^[a-f0-9]{64}$ ]]; then
              echo "::warning::ignoro artifact ${artifact_id}: pack_id invalido"
              continue
            fi

            receipted=false
            mapfile -t receipt_ids < <(
              python scripts/artifact_queue.py markers \
                --artifacts "$inventory" \
                --name "research-checker-${pack_id}"
            )
            for receipt_id in "${receipt_ids[@]}"; do
              receipt=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${receipt_id}")
              receipt_run_id=$(jq -r '.workflow_run.id // empty' <<< "$receipt")
              receipt_run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${receipt_run_id}")
              if [ "$(jq -r '.path' <<< "$receipt_run")" = ".github/workflows/research-checker.yml" ] \
                && [ "$(jq -r '.head_branch' <<< "$receipt_run")" = "main" ] \
                && [ "$(jq -r '.conclusion' <<< "$receipt_run")" = "success" ]; then
                receipted=true
                break
              fi
            done
            if [ "$receipted" = true ]; then
              echo "pack ${pack_id} gia verificato; continuo la coda"
              continue
            fi

            cp -R "$scan_dir/files/." /tmp/research-maker/
            selected="$pack_id"
            break
          done

          if [ -z "$selected" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "NO-OP: nessun pack Maker valido e non verificato"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "pack_id=$selected" >> "$GITHUB_OUTPUT"
          fi

      - name: Independent Checker L1 (Z.AI primary, OpenRouter fallback)
        if: steps.preflight.outputs.should_run == 'true'
        env:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: >-
          uv run --frozen python -m scripts.research_cloud checker
          --input-dir /tmp/research-maker
          --out-dir /tmp/research-checker

      - name: verifica checkout immutato
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: conserva il bundle Maker esatto nella receipt
        if: steps.preflight.outputs.should_run == 'true'
        run: |
          mkdir -p /tmp/research-checker/research
          cp /tmp/research-maker/pack.json /tmp/research-checker/research/pack.json
          cp /tmp/research-maker/maker.json /tmp/research-checker/research/maker.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.preflight.outputs.should_run == 'true'
        with:
          name: research-checker-${{ steps.preflight.outputs.pack_id }}
          path: /tmp/research-checker/
          retention-days: 30
          if-no-files-found: error
